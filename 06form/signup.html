<!--start the page main content-->
<main>
    <h1>Sign Up for More Information about Cats!</h1>
    <form method="get" class="myForm" action="thanks.html">
        <fieldset>
            <legend>Contact Information</legend>
            <label>First Name<input type="text" name="fname" required></label>
            <label>Last Name<input type="text" name="lname" required></label>
            <label>Email Address<input type="email" name="email"></label>
        </fieldset>
</main>
<main>
    <h1>Order a Cat Care Kit</h1>
    
        <fieldset>
            <legend>Cat Care Kit</legend>
            <label>Kit Size
                <select name="kitSize">
                    <option value="small">Small</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large</option>
                </select>
            </label>
            <label>Kit Type
                <select name="kitType">
                    <option value="basic">Basic</option>
                    <option value="deluxe">Deluxe</option>
                    <option value="premium">Premium</option>
                </select>
            </label>
        </fieldset>
    </form>
</main>

<main>
    <h1>Delivery Options</h1>
    <form method="get" class="myForm" action="thanks.html">
        <fieldset>
            <legend>Delivery Options</legend>
            <label><input type="radio" name="delivery" value="standard" checked>Standard Delivery</label>
            <label><input type="radio" name="delivery" value="express">Express Delivery</label>
            <label><input type="radio" name="delivery" value="overnight">Overnight Delivery</label>
        </fieldset>
       
    
    <label>Comments
        <textarea name="comments">Please add any special instructions for your cat care kit delivery.</textarea>
    </label>
    <input type="submit" value="Submit">
    </form>
</main>
